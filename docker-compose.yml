version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: casa
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: casaselva
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
  api:
    build: ./apps/api
    env_file: ./apps/api/.env
    depends_on: [db]
    ports: ['4000:4000']
    command: sh -c "node src/db/migrate.js && node src/index.js"
  worker:
    build: ./apps/api
    env_file: ./apps/api/.env
    depends_on: [db]
    command: node src/jobs/scheduler.js
volumes:
  pgdata:
